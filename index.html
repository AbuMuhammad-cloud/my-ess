<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple ESS (Cloud)</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --primary: #0e3d73;
      --primary-soft: #e9f1ff;
      --ink: #1f2a3a;
      --muted: #64748b;
      --bg: #f3f6fb;
      --card: #ffffff;
      --line: #d9e3f1;
      --ok: #158a53;
      --warn: #9b6d00;
      --bad: #aa1f43;
      --shadow: 0 10px 24px rgba(14, 61, 115, 0.09);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: radial-gradient(circle at top right, #ebf2ff 0%, var(--bg) 35%, #eef3fb 100%);
      color: var(--ink);
    }
    .hidden { display: none !important; }
    .auth { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; }
    .auth .card { width: min(460px, 100%); padding: 24px; }
    .auth h1 { margin: 0; font-size: 25px; color: var(--primary); letter-spacing: 0.2px; }
    .auth p { margin: 8px 0 16px; color: var(--muted); font-size: 14px; }
    label { display: block; font-size: 13px; color: #475569; margin-top: 6px; }
    input, select, button, textarea { width: 100%; font: inherit; border: 1px solid #c7d5eb; border-radius: 10px; padding: 10px 11px; margin-top: 6px; margin-bottom: 10px; background: #fff; color: var(--ink); }
    button { border: none; cursor: pointer; background: var(--primary); color: #fff; font-weight: 600; transition: 0.2s; }
    button:hover { opacity: 0.9; }
    button.ghost { background: #f5f8ff; color: var(--primary); border: 1px solid #c8d8f1; }
    .layout { min-height: 100vh; display: grid; grid-template-columns: 250px 1fr; }
    .sidebar { background: linear-gradient(180deg, #0f3d71 0%, #0a2e57 100%); color: #fff; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .sidebar button { text-align: left; background: rgba(255, 255, 255, 0.13); color: #fff; font-weight: 500; }
    .sidebar button.active { background: rgba(255, 255, 255, 0.28); }
    .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .top { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #fff; border: 1px solid var(--line); border-radius: var(--radius); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: var(--radius); padding: 12px; }
    .stat .value { font-size: 22px; color: var(--primary); font-weight: 700; }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    th, td { border-bottom: 1px solid #e7edf7; padding: 9px; text-align: left; font-size: 13px; }
    .badge { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; }
    .PENDING { background: #fff4d8; color: var(--warn); }
    .APPROVED { background: #dcf7ea; color: var(--ok); }
    .REJECTED { background: #ffe2e8; color: var(--bad); }
    @media (max-width: 1020px) { .layout, .stats { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section id="auth" class="auth">
    <div class="card">
      <h1>Simple ESS Login</h1>
      <p>Enter your credentials to manage your work records.</p>
      <form id="loginForm">
        <label>Employee ID</label>
        <input id="loginId" required />
        <label>Password</label>
        <input id="loginPass" type="password" required />
        <button type="submit">Sign In</button>
      </form>
    </div>
  </section>

  <section id="app" class="layout hidden">
    <aside class="sidebar">
      <h2>Simple ESS</h2>
      <button class="nav active" data-view="attendanceView">Attendance</button>
      <button id="adminNav" class="nav hidden" data-view="adminView">Admin Panel</button>
      <button id="logoutBtn" class="ghost">Logout</button>
    </aside>

    <main class="content">
      <div class="top">
        <div><h3 id="welcome"></h3><div id="today"></div></div>
      </div>
      <div class="stats">
        <div class="stat"><div class="label">Status</div><div class="value" id="statStatus">-</div></div>
        <div class="stat"><div class="label">In</div><div class="value" id="statIn">--:--</div></div>
        <div class="stat"><div class="label">Out</div><div class="value" id="statOut">--:--</div></div>
      </div>

      <section id="attendanceView" class="view">
        <div class="card">
          <h4>Daily Attendance</h4>
          <div style="display:flex; gap:10px;">
            <button id="checkInBtn">Check In</button>
            <button id="checkOutBtn" class="ghost">Check Out</button>
          </div>
          <table style="margin-top:20px;">
            <thead><tr><th>Date</th><th>In</th><th>Out</th><th>Status</th></tr></thead>
            <tbody id="recentBody"></tbody>
          </table>
        </div>
      </section>

      <section id="adminView" class="view hidden">
        <div class="card">
          <h4>Admin: Pending Approvals</h4>
          <table><tbody id="adminBody"></tbody></table>
        </div>
      </section>
    </main>
  </section>

  <script>
    // Database Connection
    const supabaseUrl = 'https://krmlsiftzedqcdaorasj.supabase.co'; 
    const supabaseKey = 'sb_publishable_hT3WaiyRg-T66Vgs53jTpw_T5-HaAVk';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let user = null;

    async function refresh() {
      if (!user) return;
      document.getElementById('welcome').textContent = user.name || user.id;
      document.getElementById('today').textContent = new Date().toISOString().slice(0, 10);

      const { data: att } = await _supabase.from('attendance')
        .select('*').eq('employee_id', user.id).order('date', { ascending: false });
      
      const todayRec = att.find(r => r.date === new Date().toISOString().slice(0, 10));
      document.getElementById('statStatus').textContent = todayRec ? todayRec.status : 'None';
      document.getElementById('statIn').textContent = todayRec?.check_in || '--:--';
      document.getElementById('statOut').textContent = todayRec?.check_out || '--:--';

      document.getElementById('recentBody').innerHTML = att.map(r => 
        `<tr><td>${r.date}</td><td>${r.check_in || '-'}</td><td>${r.check_out || '-'}</td><td><span class="badge ${r.status}">${r.status}</span></td></tr>`
      ).join('');

      if (user.role === 'ADMIN') {
        const { data: pend } = await _supabase.from('attendance').select('*').eq('status', 'PENDING');
        document.getElementById('adminBody').innerHTML = pend.map(r => 
          `<tr><td>${r.employee_id}</td><td>${r.date}</td><td><button onclick="approve('${r.id}')">Approve</button></td></tr>`
        ).join('');
      }
    }

    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const id = document.getElementById('loginId').value.toUpperCase();
      const pass = document.getElementById('loginPass').value;
      const { data } = await _supabase.from('employees').select('*').eq('id', id).eq('password', pass).single();
      if (data) {
        user = data;
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('adminNav').classList.toggle('hidden', user.role !== 'ADMIN');
        refresh();
      } else { alert("Login failed. Please check your credentials."); }
    };

    document.getElementById('checkInBtn').onclick = async () => {
      await _supabase.from('attendance').insert([{ 
        employee_id: user.id, date: new Date().toISOString().slice(0, 10),
        check_in: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), status: 'PENDING'
      }]);
      refresh();
    };

    document.getElementById('checkOutBtn').onclick = async () => {
      const today = new Date().toISOString().slice(0, 10);
      await _supabase.from('attendance').update({ 
        check_out: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
      }).eq('employee_id', user.id).eq('date', today);
      refresh();
    };

    window.approve = async (id) => {
      await _supabase.from('attendance').update({ status: 'APPROVED' }).eq('id', id);
      refresh();
    };

    document.getElementById('logoutBtn').onclick = () => location.reload();
    document.querySelectorAll('.nav').forEach(b => b.onclick = () => {
      document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
      document.getElementById(b.dataset.view).classList.remove('hidden');
      document.querySelectorAll('.nav').forEach(n => n.classList.remove('active'));
      b.classList.add('active');
    });
  </script>
</body>
</html>
